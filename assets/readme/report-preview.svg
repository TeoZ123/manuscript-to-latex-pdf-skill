<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560" role="img" aria-label="Validation report preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 800 34px Inter, Arial, sans-serif; fill: #0f172a; }
      .caption { font: 400 19px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Inter, Arial, sans-serif; fill: #0369a1; }
      .mono { font: 500 18px "SFMono-Regular", Consolas, monospace; fill: #334155; }
      .monoStrong { font: 700 18px "SFMono-Regular", Consolas, monospace; fill: #0f172a; }
    </style>
  </defs>
  <rect width="1280" height="560" fill="url(#bg)"/>
  <text x="78" y="82" class="title">Reviewable intermediate files</text>
  <text x="78" y="116" class="caption">Every stage is saved locally so the agent, author, and reviewer can inspect the same evidence.</text>
  <g filter="url(#shadow)">
    <rect x="78" y="160" width="530" height="310" rx="22" fill="#ffffff"/>
    <rect x="78" y="160" width="530" height="48" rx="22" fill="#0f172a"/>
    <circle cx="112" cy="184" r="7" fill="#ef4444"/>
    <circle cx="136" cy="184" r="7" fill="#f59e0b"/>
    <circle cx="160" cy="184" r="7" fill="#22c55e"/>
    <text x="104" y="245" class="monoStrong"># 转换检查</text>
    <text x="104" y="286" class="mono">- 图片引用数：1</text>
    <text x="104" y="320" class="mono">- 图题数：1</text>
    <text x="104" y="354" class="mono">- 表题数：1</text>
    <text x="104" y="388" class="mono">- 正文引用编号数：1</text>
    <text x="104" y="422" class="mono">- 未发现缺失图片。</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="674" y="160" width="528" height="310" rx="22" fill="#ffffff"/>
    <text x="710" y="218" class="label">Output contract</text>
    <text x="710" y="260" class="monoStrong">00-模板规则.md</text>
    <text x="710" y="294" class="monoStrong">01-论文主源.md</text>
    <text x="710" y="328" class="monoStrong">02-转换检查.md</text>
    <text x="710" y="362" class="monoStrong">03-LaTeX工程/</text>
    <text x="710" y="396" class="monoStrong">04-PDF输出/</text>
    <rect x="710" y="428" width="355" height="6" rx="3" fill="#38bdf8"/>
  </g>
</svg>
