<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="转换检查报告示例">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 800 34px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .caption { font: 400 19px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .label { font: 800 16px Arial, sans-serif; fill: #0369a1; letter-spacing: 1px; }
      .mono { font: 500 18px Consolas, "PingFang SC", "Microsoft YaHei", monospace; fill: #334155; }
      .monoStrong { font: 800 19px Consolas, "PingFang SC", "Microsoft YaHei", monospace; fill: #0f172a; }
      .small { font: 400 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="78" y="82" class="title">先检查每一层，再输出最终 PDF</text>
  <text x="78" y="118" class="caption">正文主源、模板规则、检查报告和编译产物分开保存，问题更容易定位。</text>

  <g filter="url(#shadow)">
    <rect x="78" y="165" width="525" height="345" rx="24" fill="#ffffff"/>
    <rect x="78" y="165" width="525" height="54" rx="24" fill="#0f172a"/>
    <circle cx="112" cy="192" r="7" fill="#ef4444"/>
    <circle cx="136" cy="192" r="7" fill="#f59e0b"/>
    <circle cx="160" cy="192" r="7" fill="#22c55e"/>
    <text x="104" y="258" class="monoStrong"># 转换检查</text>
    <text x="104" y="302" class="mono">- 图片引用数：1</text>
    <text x="104" y="336" class="mono">- 图题数：1</text>
    <text x="104" y="370" class="mono">- 表题数：1</text>
    <text x="104" y="404" class="mono">- 引用编号：已匹配</text>
    <text x="104" y="438" class="mono">- 人工复核：HTML 表格</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="165" width="526" height="345" rx="24" fill="#ffffff"/>
    <text x="714" y="226" class="label">LOCAL OUTPUTS</text>
    <text x="714" y="272" class="monoStrong">00-模板规则.md</text>
    <text x="714" y="308" class="small">记录从模板中整理出的格式要求。</text>
    <text x="714" y="356" class="monoStrong">01-论文主源.md</text>
    <text x="714" y="392" class="small">作者可以继续审阅和修改的正文入口。</text>
    <text x="714" y="440" class="monoStrong">03-LaTeX工程/  04-PDF输出/</text>
    <text x="714" y="476" class="small">保存构建源码、日志和最终 PDF。</text>
  </g>
</svg>
