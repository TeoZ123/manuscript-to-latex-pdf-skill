<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Validation report preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <style>
      .title { font: 800 34px Arial, sans-serif; fill: #0f172a; }
      .caption { font: 400 19px Arial, sans-serif; fill: #475569; }
      .label { font: 800 16px Arial, sans-serif; fill: #0369a1; letter-spacing: 1px; }
      .mono { font: 500 18px Consolas, monospace; fill: #334155; }
      .monoStrong { font: 800 19px Consolas, monospace; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <text x="78" y="82" class="title">Inspect every stage before the final PDF</text>
  <text x="78" y="118" class="caption">The workflow keeps source, rules, checks and outputs separate, so errors are easier to locate and fix.</text>

  <g filter="url(#shadow)">
    <rect x="78" y="165" width="525" height="345" rx="24" fill="#ffffff"/>
    <rect x="78" y="165" width="525" height="54" rx="24" fill="#0f172a"/>
    <circle cx="112" cy="192" r="7" fill="#ef4444"/>
    <circle cx="136" cy="192" r="7" fill="#f59e0b"/>
    <circle cx="160" cy="192" r="7" fill="#22c55e"/>
    <text x="104" y="258" class="monoStrong"># Conversion Check</text>
    <text x="104" y="302" class="mono">- images: 1</text>
    <text x="104" y="336" class="mono">- figures: 1</text>
    <text x="104" y="370" class="mono">- tables: 1</text>
    <text x="104" y="404" class="mono">- citations: matched</text>
    <text x="104" y="438" class="mono">- manual review: HTML table</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="676" y="165" width="526" height="345" rx="24" fill="#ffffff"/>
    <text x="714" y="226" class="label">LOCAL OUTPUTS</text>
    <text x="714" y="272" class="monoStrong">00-template-rules.md</text>
    <text x="714" y="308" class="small">Formatting decisions learned from the template.</text>
    <text x="714" y="356" class="monoStrong">01-manuscript.md</text>
    <text x="714" y="392" class="small">The source authors can review and edit.</text>
    <text x="714" y="440" class="monoStrong">03-latex-project/  04-pdf-output/</text>
    <text x="714" y="476" class="small">Build artifacts, logs and final PDF.</text>
  </g>
</svg>
