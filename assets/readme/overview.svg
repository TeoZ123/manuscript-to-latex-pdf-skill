<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Manuscript to LaTeX PDF workflow overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="52%" stop-color="#12304b"/>
      <stop offset="100%" stop-color="#0f3d36"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 50px Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #cbd5e1; }
      .cardTitle { font: 800 22px Arial, sans-serif; fill: #0f172a; }
      .cardText { font: 400 16px Arial, sans-serif; fill: #475569; }
      .tag { font: 800 12px Arial, sans-serif; fill: #0369a1; letter-spacing: 1.5px; }
      .mono { font: 700 16px Consolas, monospace; fill: #e2e8f0; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="190" fill="#38bdf8" opacity="0.11"/>
  <circle cx="160" cy="610" r="240" fill="#34d399" opacity="0.10"/>
  <text x="70" y="92" class="title">Manuscript to LaTeX PDF</text>
  <text x="70" y="132" class="subtitle">A staged workflow for converting manuscripts into template-compliant LaTeX and PDF.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="98" y="252" class="tag">INPUT</text>
    <text x="98" y="300" class="cardTitle">Manuscript</text>
    <text x="98" y="336" class="cardText">Word or Markdown</text>
    <text x="98" y="362" class="cardText">with figures, tables,</text>
    <text x="98" y="388" class="cardText">captions and refs.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="335" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="363" y="252" class="tag">REVIEW</text>
    <text x="363" y="300" class="cardTitle">Markdown Source</text>
    <text x="363" y="336" class="cardText">A clean source file</text>
    <text x="363" y="362" class="cardText">for human review</text>
    <text x="363" y="388" class="cardText">and correction.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="628" y="252" class="tag">FORMAT</text>
    <text x="628" y="300" class="cardTitle">LaTeX Template</text>
    <text x="628" y="336" class="cardText">Learn rules from</text>
    <text x="628" y="362" class="cardText">template files and</text>
    <text x="628" y="388" class="cardText">official examples.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="865" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="893" y="252" class="tag">BUILD</text>
    <text x="893" y="300" class="cardTitle">LaTeX Project</text>
    <text x="893" y="336" class="cardText">Generate source,</text>
    <text x="893" y="362" class="cardText">assets, logs and</text>
    <text x="893" y="388" class="cardText">compile outputs.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1095" y="210" width="115" height="210" rx="26" fill="#ffffff"/>
    <text x="1123" y="252" class="tag">PDF</text>
    <text x="1123" y="300" class="cardTitle">Final</text>
    <text x="1123" y="336" class="cardText">Check</text>
    <text x="1123" y="362" class="cardText">and</text>
    <text x="1123" y="388" class="cardText">revise.</text>
  </g>

  <g stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M292 315 H322"/>
    <path d="M557 315 H587"/>
    <path d="M822 315 H852"/>
    <path d="M1087 315 H1098"/>
  </g>
  <g fill="#93c5fd">
    <path d="M322 315 l-12 -8 v16z"/>
    <path d="M587 315 l-12 -8 v16z"/>
    <path d="M852 315 l-12 -8 v16z"/>
    <path d="M1098 315 l-12 -8 v16z"/>
  </g>

  <rect x="70" y="505" width="1140" height="96" rx="24" fill="#020617" opacity="0.55"/>
  <text x="100" y="546" class="mono">00-template-rules.md  →  01-manuscript.md  →  02-conversion-check.md</text>
  <text x="100" y="578" class="mono">03-latex-project/     →  04-pdf-output/</text>
</svg>
