<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Manuscript to LaTeX PDF workflow overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#17324d"/>
      <stop offset="100%" stop-color="#0f3f35"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 54px Inter, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 24px Inter, Arial, sans-serif; fill: #cbd5e1; }
      .label { font: 700 24px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 17px Inter, Arial, sans-serif; fill: #475569; }
      .chip { font: 700 14px Inter, Arial, sans-serif; fill: #0369a1; letter-spacing: .08em; }
      .mono { font: 600 17px "SFMono-Regular", Consolas, monospace; fill: #1e293b; }
    </style>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1090" cy="110" r="170" fill="#38bdf8" opacity="0.12"/>
  <circle cx="185" cy="510" r="210" fill="#34d399" opacity="0.1"/>
  <text x="72" y="104" class="title">Manuscript to LaTeX PDF</text>
  <text x="72" y="146" class="subtitle">Convert Word or Markdown manuscripts into template-compliant LaTeX projects and PDFs.</text>
  <g filter="url(#shadow)">
    <rect x="70" y="215" width="230" height="230" rx="28" fill="url(#card)"/>
    <text x="100" y="260" class="chip">INPUT</text>
    <text x="100" y="310" class="label">Word / Markdown</text>
    <text x="100" y="350" class="body">Manuscript content, figures,</text>
    <text x="100" y="376" class="body">tables, captions, sources,</text>
    <text x="100" y="402" class="body">references, and appendices.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="390" y="215" width="230" height="230" rx="28" fill="url(#card)"/>
    <text x="420" y="260" class="chip">CONTROL</text>
    <text x="420" y="310" class="label">Template Rules</text>
    <text x="420" y="350" class="body">Extract rules from .cls, .sty,</text>
    <text x="420" y="376" class="body">main.tex, sample PDF, and</text>
    <text x="420" y="402" class="body">bibliography examples.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="710" y="215" width="230" height="230" rx="28" fill="url(#card)"/>
    <text x="740" y="260" class="chip">BUILD</text>
    <text x="740" y="310" class="label">LaTeX Project</text>
    <text x="740" y="350" class="body">Generate reviewable source,</text>
    <text x="740" y="376" class="body">assets, contents, and compile</text>
    <text x="740" y="402" class="body">logs without hiding failures.</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1030" y="215" width="180" height="230" rx="28" fill="url(#card)"/>
    <text x="1060" y="260" class="chip">OUTPUT</text>
    <text x="1060" y="310" class="label">PDF</text>
    <text x="1060" y="350" class="body">Validated against</text>
    <text x="1060" y="376" class="body">the template, not</text>
    <text x="1060" y="402" class="body">generic defaults.</text>
  </g>
  <g stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M312 330 H372"/>
    <path d="M632 330 H692"/>
    <path d="M952 330 H1012"/>
  </g>
  <g fill="#93c5fd">
    <path d="M372 330 l-13 -8 v16z"/>
    <path d="M692 330 l-13 -8 v16z"/>
    <path d="M1012 330 l-13 -8 v16z"/>
  </g>
  <rect x="72" y="505" width="1138" height="70" rx="22" fill="#020617" opacity="0.52"/>
  <text x="102" y="548" class="mono" fill="#e2e8f0">00-模板规则.md  +  01-论文主源.md  +  02-转换检查.md  +  03-LaTeX工程/  +  04-PDF输出/</text>
</svg>
