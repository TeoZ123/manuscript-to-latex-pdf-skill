<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="论文转换流程总览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="52%" stop-color="#12304b"/>
      <stop offset="100%" stop-color="#0f3d36"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 48px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 400 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #cbd5e1; }
      .cardTitle { font: 800 22px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #0f172a; }
      .cardText { font: 400 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #475569; }
      .tag { font: 800 12px Arial, sans-serif; fill: #0369a1; letter-spacing: 1.5px; }
      .mono { font: 700 16px Consolas, "PingFang SC", "Microsoft YaHei", monospace; fill: #e2e8f0; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1120" cy="120" r="190" fill="#38bdf8" opacity="0.11"/>
  <circle cx="160" cy="610" r="240" fill="#34d399" opacity="0.10"/>
  <text x="70" y="92" class="title">论文转 LaTeX / PDF 工作流</text>
  <text x="70" y="132" class="subtitle">把原稿、正文主源、模板规则、LaTeX 工程和 PDF 分层保存，方便检查与返工。</text>

  <g filter="url(#shadow)">
    <rect x="70" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="98" y="252" class="tag">INPUT</text>
    <text x="98" y="300" class="cardTitle">论文原稿</text>
    <text x="98" y="336" class="cardText">Word 或 Markdown</text>
    <text x="98" y="362" class="cardText">包含正文、图表、</text>
    <text x="98" y="388" class="cardText">题注和参考文献。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="335" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="363" y="252" class="tag">REVIEW</text>
    <text x="363" y="300" class="cardTitle">Markdown 主源</text>
    <text x="363" y="336" class="cardText">可审阅、可修改，</text>
    <text x="363" y="362" class="cardText">作为后续正文</text>
    <text x="363" y="388" class="cardText">维护入口。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="600" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="628" y="252" class="tag">FORMAT</text>
    <text x="628" y="300" class="cardTitle">LaTeX 模板</text>
    <text x="628" y="336" class="cardText">从模板文件、</text>
    <text x="628" y="362" class="cardText">范例 PDF 和说明</text>
    <text x="628" y="388" class="cardText">整理格式规则。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="865" y="210" width="210" height="210" rx="26" fill="#ffffff"/>
    <text x="893" y="252" class="tag">BUILD</text>
    <text x="893" y="300" class="cardTitle">LaTeX 工程</text>
    <text x="893" y="336" class="cardText">生成源码、资源、</text>
    <text x="893" y="362" class="cardText">日志和可复查的</text>
    <text x="893" y="388" class="cardText">构建产物。</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1095" y="210" width="115" height="210" rx="26" fill="#ffffff"/>
    <text x="1123" y="252" class="tag">PDF</text>
    <text x="1123" y="300" class="cardTitle">输出</text>
    <text x="1123" y="336" class="cardText">编译、</text>
    <text x="1123" y="362" class="cardText">验收、</text>
    <text x="1123" y="388" class="cardText">再修改。</text>
  </g>

  <g stroke="#93c5fd" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M292 315 H322"/>
    <path d="M557 315 H587"/>
    <path d="M822 315 H852"/>
    <path d="M1087 315 H1098"/>
  </g>
  <g fill="#93c5fd">
    <path d="M322 315 l-12 -8 v16z"/>
    <path d="M587 315 l-12 -8 v16z"/>
    <path d="M852 315 l-12 -8 v16z"/>
    <path d="M1098 315 l-12 -8 v16z"/>
  </g>

  <rect x="70" y="505" width="1140" height="96" rx="24" fill="#020617" opacity="0.55"/>
  <text x="100" y="546" class="mono">00-模板规则.md  →  01-论文主源.md  →  02-转换检查.md</text>
  <text x="100" y="578" class="mono">03-LaTeX工程/   →  04-PDF输出/</text>
</svg>
